---
- name: Ensure cron is installed
  ansible.builtin.apt:
    name: cron
    state: present
    update_cache: true

- name: Ensure cron is running
  ansible.builtin.service:
    name: cron
    state: started
    enabled: true

- name: Create/update Mailman Core configuration
  ansible.builtin.template:
    src: mailman.cfg.j2
    dest: "{{ mailman3_core_etc_dir }}/mailman.cfg"
    group: "{{ __mailman3_core_group_name }}"
    mode: "0640"
    backup: "{{ mailman3_backup_configs }}"
  notify:
    - Restart mailman3-core service

# The advantage of switch this back to the 'original' method of http://localhost
# is that it bypasses TLS/SSL, so it doesn't matter if that has been added yet.
# base_url: {{ mailman3_hyperkitty_server_url }}/{{ mailman3_hyperkitty_root | default('archives/') }}

- name: Create HyperKitty configuration file
  ansible.builtin.copy:
    content: |
      [general]
      base_url: http://localhost/{{ mailman3_hyperkitty_root | default('archives/') }}
      api_key: {{ mailman3_archiver_key }}
    dest: "{{ mailman3_core_etc_dir }}/hyperkitty.cfg"
    group: "{{ __mailman3_core_group_name }}"
    mode: "0640"
    backup: "{{ mailman3_backup_configs }}"
  notify:
    - Restart mailman3-core service

- name: Install custom urls.py (base module for postorius/hyperkitty root overrides)
  ansible.builtin.template:
    src: "urls.py.j2"
    mode: "0644"
    dest: "{{ mailman3_django_project_dir }}/ansible_galaxyproject_mailman3_urls.py"
    backup: "{{ mailman3_backup_configs }}"
  # Trigger is now explicit rather than derived through mailman3_django_urls_module_name,
  # so this task installs the base file whenever it's needed, regardless of whether
  # something else (e.g. the extras overlay below) has hijacked the top-level module name.
  when: mailman3_postorius_root is defined or mailman3_hyperkitty_root is defined
  notify:
    - Reload mailman3-web service

- name: Install custom urls.py (additive overlay for SOCIALACCOUNT_ONLY workarounds)
  ansible.builtin.template:
    src: "urls_extras.py.j2"
    mode: "0644"
    dest: "{{ mailman3_django_project_dir }}/ansible_galaxyproject_mailman3_urls_extras.py"
    backup: "{{ mailman3_backup_configs }}"
  when: >
    (mailman3_socialaccount_signup_stub | default(false) | bool)
    or (mailman3_socialaccount_auto_login_url | default('') | trim | length > 0)
  notify:
    - Reload mailman3-web service

- name: Install custom middleware
  ansible.builtin.copy:
    src: "middleware.py"
    mode: "0644"
    dest: "{{ mailman3_django_project_dir }}/{{ mailman3_django_middleware_module_name }}.py"
    backup: "{{ mailman3_backup_configs }}"
  when: mailman3_wsgi_socket.startswith("/")
  notify:
    - Reload mailman3-web service

- name: Install digest cron task
  ansible.builtin.cron:
    name: "mailman digests"
    special_time: daily
    job: "{{ mailman3_install_dir }}/bin/mailman digests --periodic"
    user: "{{ __mailman3_core_user_name }}"

- name: Install notify cron task
  ansible.builtin.cron:
    name: "mailman notify"
    special_time: daily
    job: "{{ mailman3_install_dir }}/bin/mailman notify"
    user: "{{ __mailman3_core_user_name }}"
