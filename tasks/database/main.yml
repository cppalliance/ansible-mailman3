---
- name: Install postgres
  ansible.builtin.include_tasks: database/postgres.yml
  when: mailman3_database_type == "postgres"

- name: Install postgres backups (gcloud)
  ansible.builtin.include_tasks: database/backups-gcloud.yml
  when:
    - mailman3_database_type == "postgres"
    - mailman3_postgresql_gcloud_backups
